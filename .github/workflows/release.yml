name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: "386"
          - goos: windows
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: "386"
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: |
          BINARY=GinMiniServer
          if [ "$GOOS" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          SUFFIX="${GOOS}-${GOARCH}"
          [ -n "${GOARM}" ] && SUFFIX="${SUFFIX}${GOARM}"
          mkdir -p "build/${SUFFIX}"
          go build -ldflags="-s -w" -o "build/${SUFFIX}/${BINARY}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GinMiniServer-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm || '' }}
          path: build/
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: GinMiniServer-*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name 'GinMiniServer*' | while read f; do
            dir=$(dirname "$f" | sed 's|artifacts/||')
            base=$(basename "$f")
            cp "$f" "release-assets/${dir}-${base}"
          done
          ls -la release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: GinMiniServer ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changes }}

            ## Downloads
            Select the binary matching your OS and architecture:
            - `windows-amd64` / `windows-386` / `windows-arm64` — Windows
            - `linux-amd64` / `linux-386` / `linux-arm7` / `linux-arm64` — Linux
            - `darwin-amd64` / `darwin-arm64` — macOS
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
